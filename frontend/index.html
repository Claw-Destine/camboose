<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Camboose</title>
    <script>
        function hideNotification() {
            const nbar = document.body.querySelector("#notification-bar")
            nbar.classList.add("is-hidden")
        }
    </script>
</head>

<body>
    <div id="notification-bar" class="notification is-info is-hidden">
        <button class="delete" onclick="hideNotification()"></button>
        <div id="notification-msg">Error</div>
    </div>
    <div class="columns" id="main-body" hx-get="/components/body" hx-trigger="load" hx-swap="outerHTML"
        @htmx:responseError=${showNotification}></div>
</body>

</html>
