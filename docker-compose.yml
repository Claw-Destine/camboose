services:
  neo4j:
    image: neo4j:5.26.1
    container_name: neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD:-password}"
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  neo4j-mcp:
    image: mcp/neo4j-cypher:latest
    container_name: neo4j-mcp
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USERNAME: "neo4j"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-password}"
      NEO4J_DATABASE: "neo4j"
      NEO4J_TRANSPORT: "http"
      NEO4J_MCP_SERVER_HOST: "0.0.0.0"
      NEO4J_MCP_SERVER_PORT: "8000"
      NEO4J_MCP_SERVER_PATH: "/mcp/"
      NEO4J_NAMESPACE: "${NEO4J_NAMESPACE:-local}"

  playwright:
    image: mcr.microsoft.com/playwright:v1.48.2-jammy
    container_name: playwright
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DEBUG: "pw:api"
    shm_size: 1gb

  postgres:
    image: postgres:15-alpine
    container_name: penpot-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: "penpot"
      POSTGRES_USER: "penpot"
      POSTGRES_PASSWORD: "${PENPOT_DB_PASSWORD:-penpot-password}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U penpot"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: penpot-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20

  penpot-backend:
    image: penpotapp/backend:latest
    container_name: penpot-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "6063:6060"
    environment:
      PENPOT_DATABASE_URI: "postgresql://postgres:5432/penpot"
      PENPOT_DATABASE_USERNAME: "penpot"
      PENPOT_DATABASE_PASSWORD: "${PENPOT_DB_PASSWORD:-penpot-password}"
      PENPOT_REDIS_URI: "redis://redis:6379/0"
      PENPOT_SECRET_KEY: "${PENPOT_SECRET_KEY:-change-me-in-production}"
      PENPOT_ALLOW_SELF_REGISTRATION: "true"
    volumes:
      - penpot_storage:/app/storage

  penpot-frontend:
    image: penpotapp/frontend:latest
    container_name: penpot-frontend
    restart: unless-stopped
    depends_on:
      - penpot-backend
      - penpot-exporter
    ports:
      - "8081:8080"
    environment:
      PENPOT_BACKEND_URL: "http://penpot-backend:6063"

  penpot-exporter:
    image: penpotapp/exporter:latest
    container_name: penpot-exporter
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      PENPOT_REDIS_URI: "redis://redis:6379/0"
      PENPOT_PUBLIC_URI: "http://localhost:8081"
      PENPOT_SECRET_KEY: "${PENPOT_SECRET_KEY:-change-me-in-production}"

volumes:
  neo4j_data:
  neo4j_logs:
  postgres_data:
  redis_data:
  penpot_storage:
