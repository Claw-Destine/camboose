services:

  postgres:
    image: pgvector/pgvector:0.8.2-pg18-trixie
    container_name: camboose-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U camboose" ]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
