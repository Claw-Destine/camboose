services:
  playwright:
    image: mcr.microsoft.com/playwright:v1.48.2-jammy
    container_name: playwright
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DEBUG: "pw:api"
    shm_size: 1gb

  postgres:
    image: postgres:15-alpine
    container_name: penpot-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: "penpot"
      POSTGRES_USER: "penpot"
      POSTGRES_PASSWORD: "${PENPOT_DB_PASSWORD:-penpot-password}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U penpot"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: penpot-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20

  penpot-backend:
    image: penpotapp/backend:latest
    container_name: penpot-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "6063:6060"
    environment:
      PENPOT_FLAGS: "disable-email-verification"
      PENPOT_DATABASE_URI: "postgresql://postgres:5432/penpot"
      PENPOT_DATABASE_USERNAME: "penpot"
      PENPOT_DATABASE_PASSWORD: "${PENPOT_DB_PASSWORD:-penpot-password}"
      PENPOT_REDIS_URI: "redis://redis:6379/0"
      PENPOT_SECRET_KEY: "${PENPOT_SECRET_KEY:-change-me-in-production}"
      PENPOT_ALLOW_SELF_REGISTRATION: "true"
    volumes:
      - penpot_storage:/app/storage
      - penpot_assets:/opt/data/assets

  penpot-frontend:
    image: penpotapp/frontend:latest
    container_name: penpot-frontend
    restart: unless-stopped
    depends_on:
      - penpot-backend
      - penpot-exporter
    ports:
      - "8081:8080"
    environment:
      PENPOT_FLAGS: "disable-email-verification"
      PENPOT_BACKEND_URL: "http://penpot-backend:6063"
    volumes:
      - penpot_assets:/opt/data/assets

  penpot-exporter:
    image: penpotapp/exporter:latest
    container_name: penpot-exporter
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      PENPOT_REDIS_URI: "redis://redis:6379/0"
      PENPOT_PUBLIC_URI: "http://localhost:8081"
      PENPOT_SECRET_KEY: "${PENPOT_SECRET_KEY:-change-me-in-production}"

volumes:
  postgres_data:
  redis_data:
  penpot_storage:
  penpot_assets:
